<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Définissez votre nouveau mot de passe sécurisé pour votre compte Brin de Stef.">
    <title>Nouveau mot de passe - Brin de Stef</title>
    <link rel="stylesheet" href="style.css">
    <link href="images/logoz13.PNG" rel="icon" type="image/x-icon">
    <style>
        :root { --black: #1a1a1a; --gray: #707070; --gray-light: #f5f5f5; --gold: #c5a880; --gold-dark: #a68a62; }
        
        body { background-color: #ffffff; color: var(--black); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        .account-container { max-width: 1000px; margin: 40px auto; padding: 0 20px; font-family: 'Lato', sans-serif; flex: 1; }
        .auth-box { max-width: 450px; margin: 0 auto; background: white; padding: 35px; border-radius: 4px; border: 1px solid var(--gray-light); box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        
        .auth-box input { padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-family: 'Lato', sans-serif; font-size: 0.9rem; background: #fff; width: 100%; box-sizing: border-box; }
        .auth-box input:focus { outline: none; border-color: var(--gold-dark); }
        
        .btn-black { background: var(--black); color: white; border: none; padding: 14px; width: 100%; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem; cursor:pointer; border-radius:4px; transition: 0.2s; }
        .btn-black:hover { background: var(--gold-dark); }

        .header-banner { background: white; padding: 10px 20px; text-align: center; border-bottom: 1px solid var(--gray-light); }
        .logo-container { display: block; margin-bottom: 2px; text-decoration: none; }
        .logo-container img { max-height: 270px; width: auto; display: block; margin: 0 auto; }
        .nav-links { display: flex; justify-content: center; gap: 30px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px; }
        .nav-links a { color: var(--black); text-decoration: none; font-family: 'Lato', sans-serif; transition: color 0.2s; }
        .nav-links a:hover { color: var(--gold); }

        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border-width: 0; }
    </style>
</head>
<body>

    <header class="header-banner">
        <a href="index.html" class="logo-container" aria-label="Retour à l'accueil Brin de Stef">
            <img src="images/LOGOB.PNG" alt="Logo Brin de Stef">
        </a>
        <nav class="nav-links" aria-label="Navigation secondaire">
            <a href="index.html">Accueil</a>
            <a href="boutique.html">Boutique</a>
            <a href="compte.html">Mon Compte</a>
        </nav>
    </header>

    <main class="account-container">
        <h1 class="sr-only">Définir un nouveau mot de passe</h1>
        
        <section class="auth-box" aria-labelledby="reset-title">
            <h2 id="reset-title" style="font-family:'Playfair Display', serif; margin-bottom:10px; font-size:1.5rem; text-align:center;">Nouveau mot de passe</h2>
            <p style="color:var(--gray); text-align:center; font-size:0.85rem; margin-bottom:25px;">Saisissez et confirmez votre nouveau mot de passe.</p>
            
            <form onsubmit="handlePasswordUpdate(event)">
                <div class="form-group">
                    <label for="newPassword" class="sr-only">Nouveau mot de passe</label>
                    <input type="password" id="newPassword" placeholder="Nouveau mot de passe" required aria-required="true" autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="sr-only">Confirmez le mot de passe</label>
                    <input type="password" id="confirmPassword" placeholder="Confirmez le mot de passe" required aria-required="true" autocomplete="new-password">
                </div>
                
                <button type="submit" class="btn-black">Enregistrer le mot de passe</button>
            </form>
        </section>
    </main>

    <div id="notification" role="status" aria-live="polite" style="position:fixed; bottom:20px; right:20px; background:var(--black); color:white; padding:15px 25px; font-size:0.9rem; border-radius:4px; display:none; z-index:9999; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
        <span id="notifText"></span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    
    <script>
        // Fonction d'alerte locale
        function showLocalNotif(text) {
            const n = document.getElementById('notification');
            if (n) {
                document.getElementById('notifText').textContent = text;
                n.style.display = 'block';
                setTimeout(() => { n.style.display = 'none'; }, 4000);
            }
        }

        // Vérification à l'ouverture de la page pour alerter si le lien est expiré
        window.addEventListener('DOMContentLoaded', () => {
            if (window.supabaseClient) {
                window.supabaseClient.auth.getSession().then(({ data }) => {
                    // Supabase injecte automatiquement le token du mail dans le hash de l'URL pour créer une session temporaire.
                    // S'il n'y a ni session, ni hash, le lien est probablement invalide.
                    if (!data.session && !window.location.hash.includes('access_token')) {
                        showLocalNotif("⚠️ Lien de récupération expiré ou invalide. Veuillez refaire une demande depuis 'Mon Compte'.");
                    }
                });
            }
        });

        // Validation et envoi du nouveau mot de passe
        async function handlePasswordUpdate(event) {
            event.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = event.target.querySelector('button[type="submit"]');
            
            if (newPassword !== confirmPassword) {
                showLocalNotif("⚠️ Les mots de passe ne correspondent pas.");
                return;
            }
            
            if (newPassword.length < 6) {
                showLocalNotif("⚠️ Votre mot de passe doit contenir au moins 6 caractères.");
                return;
            }

            submitBtn.textContent = 'Enregistrement...';
            submitBtn.disabled = true;

            try {
                if (!window.supabaseClient) throw new Error("Serveur inaccessible.");
                
                // Supabase utilise la session active (créée via le clic sur l'email) pour mettre à jour l'utilisateur
                const { error } = await window.supabaseClient.auth.updateUser({
                    password: newPassword
                });

                if (error) throw error;

                showLocalNotif("✅ Mot de passe mis à jour avec succès ! Redirection...");
                
                // Redirection fluide vers l'espace client après 2 secondes
                setTimeout(() => {
                    window.location.href = 'compte.html';
                }, 2000);
                
            } catch (err) {
                showLocalNotif("❌ Erreur : " + err.message);
                submitBtn.textContent = 'Enregistrer le mot de passe';
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
